title: StudyApp Docs
description: Peer-to-Peer Tutoring Marketplace — Developer Documentation
url: "https://hiyokun-d.github.io"
baseurl: "/study-app"

theme: Midnight

# ── Site settings ────────────────────────────────────────────────────────────
logo: # path to logo if you have one, e.g. /assets/images/logo.png
favicon_ico: # path to favicon

# ── Search ───────────────────────────────────────────────────────────────────
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

# ── Aux links (top-right nav) ─────────────────────────────────────────────────
aux_links:
  "GitHub":
    - "https://github.com/hiyokun-d/study-app"

aux_links_new_tab: true

# ── Footer ───────────────────────────────────────────────────────────────────
footer_content: "Made with ❤️ by the StudyApp team."

# ── Color scheme ─────────────────────────────────────────────────────────────
color_scheme: dark # "light" or "dark"

# ── Code copy button ─────────────────────────────────────────────────────────
enable_copy_code_button: true

# ── Back to top ──────────────────────────────────────────────────────────────
back_to_top: true
back_to_top_text: "Back to top"

# ── Navigation ───────────────────────────────────────────────────────────────
nav_sort: order # sort nav items by front-matter `nav_order`

# ── Plugins ──────────────────────────────────────────────────────────────────
plugins:
  - jekyll-seo-tag

# ── Exclude from build ───────────────────────────────────────────────────────
exclude:
  - "*.gemspec"
  - node_modules/
  - _server/node_modules/
  - _server/
  - android/
  - lib/
  - web/
  - pubspec.yaml
  - pubspec.lock
  - analysis_options.yaml
  - code_ignore
