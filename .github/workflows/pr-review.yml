name: PR Code Review

# Triggers on every PR targeting master вЂ” opened, updated, or reopened
on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened]

# Minimal permissions: only read code + write PR comments
permissions:
  contents: read
  pull-requests: write

jobs:
  flutter-ci:
    name: Flutter CI Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # в”Ђв”Ђ 1. Checkout в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Checkout code
        uses: actions/checkout@v4

      # в”Ђв”Ђ 2. Setup Flutter (stable, cached) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      # в”Ђв”Ђ 3. Install dependencies в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Install dependencies
        id: pub_get
        run: flutter pub get

      # в”Ђв”Ђ 4. Static analysis (dart analyze) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Flutter analyze
        id: analyze
        run: flutter analyze --no-fatal-infos 2>&1 | tee analyze_output.txt
        continue-on-error: true

      # в”Ђв”Ђ 5. Run tests (if any test files exist) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Flutter test
        id: test
        run: |
          # Only run tests if test directory contains test files
          if find test -name '*_test.dart' 2>/dev/null | grep -q .; then
            flutter test --reporter=compact 2>&1 | tee test_output.txt
          else
            echo "No test files found вЂ” skipping." | tee test_output.txt
          fi
        continue-on-error: true

      # в”Ђв”Ђ 6. Post review comment on the PR в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - name: Post review comment
        if: always()
        uses: actions/github-script@v7
        env:
          ANALYZE_OUTCOME: ${{ steps.analyze.outcome }}
          TEST_OUTCOME: ${{ steps.test.outcome }}
          PUB_GET_OUTCOME: ${{ steps.pub_get.outcome }}
        with:
          # github-script uses the built-in GITHUB_TOKEN вЂ” no extra secrets needed
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            // в”Ђв”Ђ Read captured output (truncate to avoid huge comments) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
            const MAX_CHARS = 3000;
            function readOutput(file) {
              try {
                const raw = fs.readFileSync(file, 'utf8').trim();
                return raw.length > MAX_CHARS
                  ? raw.slice(0, MAX_CHARS) + '\nвЂ¦(truncated, see full logs above)'
                  : raw;
              } catch { return '(no output captured)'; }
            }

            const analyzeOutput = readOutput('analyze_output.txt');
            const testOutput    = readOutput('test_output.txt');

            const pubGetOk  = process.env.PUB_GET_OUTCOME  === 'success';
            const analyzeOk = process.env.ANALYZE_OUTCOME  === 'success';
            const testOk    = process.env.TEST_OUTCOME     === 'success';
            const allPassed = pubGetOk && analyzeOk && testOk;

            const owner    = context.repo.owner;          // repo owner to ping on success
            const prAuthor = context.payload.pull_request.user.login; // PR author to ping on failure
            const runUrl   = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            let body = '';

            if (allPassed) {
              // в”Ђв”Ђ SUCCESS в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
              body = [
                '## вњ… All Checks Passed!',
                '',
                `Hey @${owner} вЂ” this PR is clean and ready for your review! рџљЂ`,
                '',
                '| Check | Status |',
                '|-------|--------|',
                '| Dependency install (`flutter pub get`) | вњ… Passed |',
                '| Static analysis (`flutter analyze`)    | вњ… Passed |',
                '| Tests (`flutter test`)                 | вњ… Passed |',
                '',
                `[View full run logs](${runUrl})`,
              ].join('\n');

            } else {
              // в”Ђв”Ђ FAILURE в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
              const failedChecks = [];
              const fixes = [];

              if (!pubGetOk) {
                failedChecks.push('вќЊ **Dependency install** (`flutter pub get`) вЂ” failed');
                fixes.push('- Run `flutter pub get` locally and make sure `pubspec.yaml` / `pubspec.lock` are valid and committed.');
              }
              if (!analyzeOk) {
                failedChecks.push('вќЊ **Static analysis** (`flutter analyze`) вЂ” errors found');
                fixes.push('- Run `flutter analyze` locally, fix all reported errors and warnings, then push again.');
              }
              if (!testOk) {
                failedChecks.push('вќЊ **Tests** (`flutter test`) вЂ” one or more tests failed');
                fixes.push('- Run `flutter test` locally, read the failure output, and fix the failing tests before merging.');
              }

              const analyzeSection = !analyzeOk
                ? `\n<details>\n<summary>рџ“‹ Analyze output (click to expand)</summary>\n\n\`\`\`\n${analyzeOutput}\n\`\`\`\n</details>\n`
                : '';

              const testSection = !testOk
                ? `\n<details>\n<summary>рџ“‹ Test output (click to expand)</summary>\n\n\`\`\`\n${testOutput}\n\`\`\`\n</details>\n`
                : '';

              body = [
                '## вќЊ CI Checks Failed',
                '',
                `Hey @${prAuthor}, the following checks failed вЂ” please fix them before this PR can be merged:`,
                '',
                '### Failed Checks',
                ...failedChecks,
                '',
                '### What To Fix',
                ...fixes,
                analyzeSection,
                testSection,
                '---',
                `[View full run logs](${runUrl})`,
              ].join('\n');
            }

            // в”Ђв”Ђ Post the comment в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              body,
            });

            // в”Ђв”Ђ Fail the workflow job on errors so the PR is blocked в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
            if (!allPassed) {
              core.setFailed('One or more CI checks failed. See PR comment for details.');
            }
