name: PR Code Review

# pull_request_target runs in base-repo context → GITHUB_TOKEN gets write
# permissions even for fork PRs. We explicitly checkout the PR head so the
# flutter checks run against the contributor's actual code.
on:
  pull_request_target:
    branches: [master]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  flutter-ci:
    name: Flutter CI Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── 1. Checkout PR head (not base) ───────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      # ── 2. Setup Flutter (latest stable) ────────────────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # ── 3. Install dependencies ──────────────────────────────────────────────
      - name: Install dependencies
        id: pub_get
        run: flutter pub get

      # ── 4. Static analysis ───────────────────────────────────────────────────
      - name: Flutter analyze
        id: analyze
        run: flutter analyze --no-fatal-infos 2>&1 | tee analyze_output.txt
        continue-on-error: true

      # ── 5. Run tests (if any exist) ──────────────────────────────────────────
      - name: Flutter test
        id: test
        run: |
          if find test -name '*_test.dart' 2>/dev/null | grep -q .; then
            flutter test --reporter=compact 2>&1 | tee test_output.txt
          else
            echo "No test files found — skipping." | tee test_output.txt
          fi
        continue-on-error: true

      # ── 6. Post review comment ───────────────────────────────────────────────
      - name: Post review comment
        if: always()
        uses: actions/github-script@v7
        env:
          ANALYZE_OUTCOME: ${{ steps.analyze.outcome }}
          TEST_OUTCOME: ${{ steps.test.outcome }}
          PUB_GET_OUTCOME: ${{ steps.pub_get.outcome }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            const MAX_CHARS = 3000;
            function readOutput(file) {
              try {
                const raw = fs.readFileSync(file, 'utf8').trim();
                return raw.length > MAX_CHARS
                  ? raw.slice(0, MAX_CHARS) + '\n…(truncated, see full logs above)'
                  : raw;
              } catch { return '(no output captured)'; }
            }

            const analyzeOutput = readOutput('analyze_output.txt');
            const testOutput    = readOutput('test_output.txt');

            const pubGetOk  = process.env.PUB_GET_OUTCOME  === 'success';
            const analyzeOk = process.env.ANALYZE_OUTCOME  === 'success';
            const testOk    = process.env.TEST_OUTCOME     === 'success';
            const allPassed = pubGetOk && analyzeOk && testOk;

            const owner    = context.repo.owner;
            const prAuthor = context.payload.pull_request.user.login;
            const runUrl   = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            let body = '';

            if (allPassed) {
              body = [
                '## ✅ All Checks Passed!',
                '',
                `Hey @${owner} — this PR is clean and ready for your review! 🚀`,
                '',
                '| Check | Status |',
                '|-------|--------|',
                '| Dependency install (`flutter pub get`) | ✅ Passed |',
                '| Static analysis (`flutter analyze`)    | ✅ Passed |',
                '| Tests (`flutter test`)                 | ✅ Passed |',
                '',
                `[View full run logs](${runUrl})`,
              ].join('\n');
            } else {
              const failedChecks = [];
              const fixes = [];

              if (!pubGetOk) {
                failedChecks.push('❌ **Dependency install** (`flutter pub get`) — failed');
                fixes.push('- Run `flutter pub get` locally and make sure `pubspec.yaml` / `pubspec.lock` are valid and committed.');
              }
              if (!analyzeOk) {
                failedChecks.push('❌ **Static analysis** (`flutter analyze`) — errors found');
                fixes.push('- Run `flutter analyze` locally, fix all reported errors and warnings, then push again.');
              }
              if (!testOk) {
                failedChecks.push('❌ **Tests** (`flutter test`) — one or more tests failed');
                fixes.push('- Run `flutter test` locally, read the failure output, and fix the failing tests before merging.');
              }

              const analyzeSection = !analyzeOk
                ? `\n<details>\n<summary>📋 Analyze output (click to expand)</summary>\n\n\`\`\`\n${analyzeOutput}\n\`\`\`\n</details>\n`
                : '';

              const testSection = !testOk
                ? `\n<details>\n<summary>📋 Test output (click to expand)</summary>\n\n\`\`\`\n${testOutput}\n\`\`\`\n</details>\n`
                : '';

              body = [
                '## ❌ CI Checks Failed',
                '',
                `Hey @${prAuthor}, the following checks failed — please fix them before this PR can be merged:`,
                '',
                '### Failed Checks',
                ...failedChecks,
                '',
                '### What To Fix',
                ...fixes,
                analyzeSection,
                testSection,
                '---',
                `[View full run logs](${runUrl})`,
              ].join('\n');
            }

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              body,
            });

            if (!allPassed) {
              core.setFailed('One or more CI checks failed. See PR comment for details.');
            }
